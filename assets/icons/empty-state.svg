<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 340 326"
     width="340"
     height="326"
     fill="none"
     role="img"
     aria-labelledby="title desc">
  <title id="title">Empty folder illustration</title>
  <desc id="desc">A minimal empty folder with a zero bubble, spider web, dotted path, and small floating decorations.</desc>

  <!-- Soft background shapes -->
  <rect x="19" y="1" width="301" height="61" rx="30.5" fill="#EEF1F3"/>
  <rect x="19" y="127" width="301" height="63" rx="31.5" fill="#EEF1F3"/>
  <rect x="19" y="258" width="301" height="59" rx="29.5" fill="#EEF1F3"/>

  <!-- Count bubble -->
  <path d="M84 57
           C84 35.5 101.5 18 123 18
           H160
           C181.5 18 199 35.5 199 57
           V63
           C199 82.2 185.1 98.1 166.8 101.3
           L164.4 109.5
           C163.4 113 159 114.1 156.5 111.4
           L146.9 101.8
           H123
           C101.5 101.8 84 84.3 84 62.8
           Z"
        fill="#E0E5E9"
        stroke="#AEB8C0"
        stroke-width="1.4"/>

  <text x="141.5" y="80"
        text-anchor="middle"
        font-family="Inter, system-ui, sans-serif"
        font-size="55"
        font-weight="600"
        fill="#B8C3CB">0</text>

  <!-- Folder back -->
  <path d="M69 191
           L92 132
           C94.2 126.3 99.7 122.5 105.8 122.5
           H224.5
           C231.3 122.5 237.5 126.2 240.7 132.2
           L281.5 208.5
           L271.5 286.5
           H66.5
           Z"
        fill="#DCE3E8"
        stroke="#AEB8C0"
        stroke-width="1.5"
        stroke-linejoin="round"/>

  <!-- Inner panel -->
  <path d="M147 122.5
           H224.5
           C231.3 122.5 237.5 126.2 240.7 132.2
           L227.5 209.5
           H158.2
           C153.1 209.5 148.7 206.2 147.2 201.3
           L132.8 154.7
           C128.7 141.4 136.6 127.5 147 122.5 Z"
        fill="#C9D2D9"/>

  <!-- Folder front -->
  <path d="M54.5 190.5
           C54.1 186.2 57.5 182.5 61.8 182.5
           H141.7
           C145.6 182.5 149.2 184.4 151.3 187.6
           L163.2 205.5
           C165.3 208.7 168.9 210.5 172.8 210.5
           H278.4
           C283 210.5 286.4 214.8 285.3 219.3
           L274.8 293.5
           C274.1 297.5 270.7 300.5 266.6 300.5
           H70.1
           C65.5 300.5 61.8 297 61.3 292.5
           Z"
        fill="#E1E6EA"
        stroke="#AEB8C0"
        stroke-width="1.5"
        stroke-linejoin="round"/>

  <!-- Spider web -->
  <path d="M89.5 132
           C106 139 116.5 153.5 117.5 172.5
           M89.5 132
           C102 147 106 162 104 181
           M89.5 132
           C95 151 94 166 91 184
           M96 140
           C105.5 142 113 147.5 117 155
           M94.5 153.5
           C104 155 111 160 115 167
           M93 168
           C102 169 108.5 173 112 179"
        stroke="#B8C2CA"
        stroke-width="1.25"
        stroke-linecap="round"/>

  <!-- Face -->
  <circle cx="95" cy="232" r="9" fill="#BBC5CD"/>
  <circle cx="135" cy="232" r="9" fill="#BBC5CD"/>
  <path d="M104 275
           V265
           C104 257.8 109.8 252 117 252
           C124.2 252 130 257.8 130 265
           V275"
        stroke="#B5C0C8"
        stroke-width="6"
        stroke-linecap="butt"/>

  <!-- Dotted flight path -->
  <path d="M189 207
           C187 167 193 129 214 99
           C226 82 242 71 260 67"
        stroke="#AEB8C0"
        stroke-width="1.35"
        stroke-linecap="round"
        stroke-dasharray="4 5"/>

  <!-- Loop -->
  <path d="M210 101
           C220 89 239 91 243 103
           C247 114 235 124 224 120
           C214 117 210 109 210 101 Z"
        stroke="#AEB8C0"
        stroke-width="1.15"
        stroke-dasharray="3.5 4.5"/>

  <!-- Small paper plane / leaf -->
  <path d="M250 32
           C252 28 256 28 260 30
           L272 36
           C276 38 276 43 272 45
           L259 51
           C255 53 251 51 250 47
           L254 40
           Z"
        fill="#DCE2E6"
        stroke="#AEB8C0"
        stroke-width="1.2"
        stroke-linejoin="round"/>
  <path d="M251.5 40 H272"
        stroke="#B8C2CA"
        stroke-width="1.1"
        stroke-linecap="round"/>

  <!-- Floating circles -->
  <circle cx="54" cy="91" r="4.5" stroke="#AEB8C0" stroke-width="1.2"/>
  <circle cx="281" cy="96" r="10" stroke="#AEB8C0" stroke-width="1.2"/>
  <circle cx="46" cy="251" r="5.5" stroke="#AEB8C0" stroke-width="1.2"/>
  <circle cx="287" cy="160" r="3.2" stroke="#AEB8C0" stroke-width="1.1"/>
</svg>
